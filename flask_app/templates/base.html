<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script>try { if (localStorage.getItem('zp-sidebar-collapsed') === '1') document.documentElement.classList.add('zp-sidebar-collapsed') } catch (e) {}</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}ZeroProxy{% endblock %} — Smart Attendance System</title>
  <meta name="description" content="Smart attendance management system with QR scanning, parent alerts, and analytics">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <script src="{{ url_for('static', filename='js/app.js') }}" defer></script>
  {% block head %}{% endblock %}
</head>
<body>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <div id="flash-messages" data-messages='{{ messages | tojson }}'></div>
    {% endif %}
  {% endwith %}
  {% block body %}{% endblock %}
</body>
</html>
