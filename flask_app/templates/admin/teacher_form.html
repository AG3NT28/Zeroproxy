{% extends 'shell.html' %}
{% block content %}
<div class="card">
  <div class="card-title" style="margin-bottom:16px">{{ 'Edit Teacher' if teacher else 'Add Teacher' }}</div>
  <form method="post" action="{{ url_for('admin.edit_teacher', uname=teacher.username) if teacher else url_for('admin.new_teacher') }}">
    {% if not teacher %}
    <div class="field"><label>Username</label><input name="username" placeholder="e.g. prof.iyer" required></div>
    {% endif %}
    <div class="field-row">
      <div class="field"><label>Full Name</label><input name="name" value="{{ teacher.name if teacher else '' }}" required></div>
      <div class="field"><label>Department</label>
        <select name="dept">
          {% for d in depts %}<option value="{{ d }}"{{ ' selected' if teacher and teacher.dept == d }}>{{ d }}</option>{% endfor %}
        </select>
      </div>
    </div>
    <div class="field-row">
      <div class="field"><label>Email</label><input type="email" name="email" value="{{ teacher.email if teacher else '' }}"></div>
      <div class="field"><label>Phone</label><input name="phone" value="{{ teacher.phone if teacher else '' }}"></div>
    </div>
    <div class="field"><label>Subjects (comma-separated)</label><input name="subjects" value="{{ teacher.subjects|join(', ') if teacher and teacher.subjects else '' }}" placeholder="CS301, CS401"></div>
    <div class="field"><label>Password</label><input name="password" placeholder="{{ 'Leave to keep unchanged' if teacher else 'pass123' }}" value="{{ teacher.password if teacher else '' }}"></div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-primary" type="submit">{{ 'Save Changes' if teacher else 'Add Teacher' }}</button>
      <a class="btn btn-secondary" href="{{ url_for('admin.teachers') }}">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
